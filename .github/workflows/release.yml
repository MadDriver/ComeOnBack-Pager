name: Release

# Build a match-signed App Store binary and upload it to TestFlight, on a `v<version>`
# git tag. Credentials come from GitHub secrets; nothing sensitive lives in the repo. A
# real upload needs BOTH the ASC API key AND the match secrets; if either is absent the
# job builds unsigned (a compile check) and skips. `workflow_dispatch` runs the same
# signed build as a dry run (no upload). Mirrors the ios repo's release.yml.

on:
  push:
    tags: ['v[0-9]*']
  workflow_dispatch: {}

permissions:
  contents: read

# Never let two releases race the TestFlight upload.
concurrency:
  group: testflight-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-15
    env:
      HAS_ASC: ${{ secrets.ASC_KEY_ID != '' && secrets.ASC_ISSUER_ID != '' && secrets.ASC_KEY_CONTENT != '' }}
      HAS_MATCH: ${{ secrets.MATCH_PASSWORD != '' && secrets.MATCH_GIT_BASIC_AUTHORIZATION != '' }}
      IS_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Coupling guard: the pushed tag (e.g. v1.0) must match MARKETING_VERSION in
      # project.yml (the XcodeGen source of truth). Skipped on workflow_dispatch.
      - name: Verify tag matches app version
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          VERSION=$(grep -m1 -E 'MARKETING_VERSION:' project.yml \
            | sed -E 's/.*MARKETING_VERSION: *"?([^" ]+)"?.*/\1/')
          TAG="${GITHUB_REF_NAME#v}"
          echo "tag=${GITHUB_REF_NAME} MARKETING_VERSION=${VERSION}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match MARKETING_VERSION ${VERSION}. Bump the version or fix the tag."
            exit 1
          fi

      # Xcode 26: Apple requires the iOS 26 SDK for ALL App Store Connect uploads. The
      # macos-15 image ships a RELEASE (non-beta) Xcode 26, so CI binaries are App Store
      # Review-eligible — unlike the dev Mac's beta-only device toolchain.
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      # The .xcodeproj is generated — fastlane lanes regenerate too, but the unsigned
      # fallback path below uses raw xcodebuild and needs the project to exist.
      - name: Generate the Xcode project
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Set up Ruby + bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build + upload to TestFlight
        if: env.IS_DRY_RUN == 'false' && env.HAS_ASC == 'true' && env.HAS_MATCH == 'true'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane beta_ci

      - name: Build signed .ipa (dry run, no upload)
        if: env.IS_DRY_RUN == 'true' && env.HAS_ASC == 'true' && env.HAS_MATCH == 'true'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane beta_ci upload:false

      - name: Build unsigned (secrets missing — compile check only)
        if: env.HAS_ASC != 'true' || env.HAS_MATCH != 'true'
        run: |
          [ "${HAS_ASC}" != "true" ] && echo "::warning::ASC_* secrets not set — skipped the signed build/upload."
          [ "${HAS_MATCH}" != "true" ] && echo "::warning::MATCH_* secrets not set — skipped the signed build/upload."
          echo "Building unsigned for device (compile check). Configure the secrets to enable signing."
          xcodebuild build -project "ComeOnBack Pager.xcodeproj" -scheme ComeOnBackPager \
            -destination 'generic/platform=iOS' -configuration Release CODE_SIGNING_ALLOWED=NO

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-ipa
          path: build/ComeOnBackPager.ipa
          if-no-files-found: ignore
          retention-days: 14
