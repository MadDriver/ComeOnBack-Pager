name: CI

# PR gate: unsigned compile check of the XcodeGen-generated project. No signing, no
# secrets — runs on a GitHub-hosted macOS runner with a released Xcode (this repo's dev
# Mac only has a beta Xcode for device/sim builds, so CI is the clean build environment).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # Pin to a released Xcode 16.x. The runner default can drift; this keeps the
      # toolchain deterministic (same convention as the ios repo's ci.yml).
      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Generate the Xcode project
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Build (simulator, unsigned)
        run: |
          xcodebuild -project "ComeOnBack Pager.xcodeproj" -scheme ComeOnBackPager \
            -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' \
            -configuration Debug CODE_SIGNING_ALLOWED=NO build
