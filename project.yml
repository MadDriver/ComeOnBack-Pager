# XcodeGen spec — the committed source of truth for the Xcode project.
# `ComeOnBack Pager.xcodeproj` is generated (gitignored): run `xcodegen generate`
# after adding/removing files. See CLAUDE.md for the full headless workflow.
name: ComeOnBack Pager
options:
  minimumXcodeGenVersion: "2.40"
  deploymentTarget:
    iOS: "16.2"
  createIntermediateGroups: true

targets:
  ComeOnBack Pager:
    type: application
    platform: iOS
    sources:
      - path: ComeOnBack Pager
        excludes:
          # local-only dev scratch file (gitignored); never part of the build
          - LocalLoginComponents.swift
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # pin to the Xcode-template values (XcodeGen's presets lag Xcode's)
        CLANG_CXX_LANGUAGE_STANDARD: gnu++20
        CODE_SIGN_IDENTITY: Apple Development
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 18
        DEVELOPMENT_TEAM: 9XKN747L88
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: ComeOnBack Pager/Info.plist
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight
        MARKETING_VERSION: "1.0"
        PRODUCT_BUNDLE_IDENTIFIER: co.amalgamated.ComeOnBackPager
        PRODUCT_NAME: $(TARGET_NAME)
        SUPPORTED_PLATFORMS: iphoneos iphonesimulator
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "2"
      configs:
        Release:
          VALIDATE_PRODUCT: YES

schemes:
  ComeOnBackPager:
    build:
      targets:
        ComeOnBack Pager: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
